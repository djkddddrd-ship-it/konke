<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Моя игра</title>
  <style>
    body{
      margin:0; font-family:Arial, sans-serif;
      background:#0b1020; color:#fff;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }
    .card{
      text-align:center; padding:24px 18px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      width:min(520px, 92vw);
    }
    h1{margin:0 0 10px; font-size:28px;}
    p{margin:0 0 18px; opacity:0.9;}
    a.btn{
      display:inline-block; padding:12px 18px;
      background:#4f8cff; color:#061224;
      border-radius:12px; text-decoration:none; font-weight:700;
    }
    a.btn:hover{filter:brightness(1.05);}
    .small{margin-top:10px; font-size:13px; opacity:0.75;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Моя игра</h1>
    <p>Нажми кнопку — скачать .exe</p>
    <a class="btn" href="REPLACE_WITH_LINK_TO_RELEASE_ASSET">
      Скачать
    </a>
    <div class="small">Версия: 1.0</div>
  </div>
</body>
</html>
