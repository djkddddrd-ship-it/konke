  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0c1a;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 24px;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(79, 140, 255, 0.20) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(0, 255, 200, 0.10) 0%, transparent 50%);
    }

    .game-card {
      position: relative;
      width: min(1200px, 96vw);
      background: rgba(18, 24, 42, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 48px 52px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(79, 140, 255, 0.10), transparent, rgba(0, 255, 200, 0.10), transparent);
      animation: spin 18s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .game-card > * {
      position: relative;
      z-index: 2;
    }

    .version-badge {
      position: absolute;
      top: 24px;
      right: 32px;
      color: #8b9bb8;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.4px;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 22px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 20;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .left-col {
      flex: 1.2;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .actions-block {
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: 100%;
      padding: 28px 32px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.5);
    }

    .btn-primary {
      background: #4f8cff;
      color: #0a0c1a;
    }
    .btn-primary:hover {
      background: #6a9eff;
      box-shadow: 0 10px 34px rgba(79, 140, 255, 0.45);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.09);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .btn-vk {
      background: #0077ff;
      color: #ffffff;
    }
    .btn-vk:hover {
      background: #1e88ff;
      box-shadow: 0 10px 34px rgba(0, 119, 255, 0.40);
    }

    .btn-vk-bot {
      background: #4e10ae;
      color: #ffffff;
    }
    .btn-vk-bot:hover {
      background: #4512ae;
      box-shadow: 0 10px 34px rgba(158, 128, 218, 0.4);
    }

    .btn svg {
      width: 32px;
      height: 32px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .right-col {
      flex: 1.8;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-block {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 4px;
    }

    .game-logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      overflow: hidden;
      background: #141b33;
      box-shadow: 0 0 36px rgba(79, 140, 255, 0.30);
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .game-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .game-title {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: #ffffff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    .game-subtitle {
      color: #a0b5d4;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .description {
      color: #c8d6ea;
      font-size: 20px;
      line-height: 1.8;
      max-width: 95%;
      margin-top: 6px;
      font-weight: 400;
    }

    .screenshots-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 14px;
    }

    .screenshot-item {
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      background: #10172e;
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: transform 0.25s ease, border-color 0.3s;
    }

    .screenshot-item:hover {
      transform: scale(1.03);
      border-color: rgba(79, 140, 255, 0.3);
    }

    .screenshot-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 820px) {
      .game-card {
        flex-direction: column;
        padding: 32px 28px;
        gap: 36px;
      }
      .left-col, .right-col {
        min-width: 100%;
      }
      .game-title {
        font-size: 38px;
      }
      .version-badge {
        font-size: 17px;
        top: 18px;
        right: 20px;
        padding: 6px 16px;
      }
      .btn {
        font-size: 19px;
        padding: 24px 26px;
        gap: 14px;
      }
      .btn svg {
        width: 28px;
        height: 28px;
      }
      .description {
        font-size: 18px;
      }
      .screenshots-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
    }

    @media (max-width: 480px) {
      .game-card {
        padding: 24px 18px;
        gap: 28px;
      }
      .game-title {
        font-size: 30px;
      }
      .game-subtitle {
        font-size: 18px;
      }
      .btn {
        font-size: 16px;
        padding: 20px 16px;
        gap: 12px;
        border-radius: 18px;
      }
      .btn svg {
        width: 24px;
        height: 24px;
      }
      .version-badge {
        font-size: 14px;
        top: 14px;
        right: 14px;
        padding: 4px 14px;
      }
      .description {

      }
      .game-logo {
        width: 72px;
        height: 72px;
      }
    }
