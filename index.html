<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konke - Скачать игру</title>
    <style>
        /* Сброс стилей и базовые настройки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0a0c1a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 140, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 200, 0.1) 0%, transparent 50%);
        }

        /* Главная карточка */
        .game-card {
            background: rgba(18, 24, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: min(560px, 94vw);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Задний неоновый блик карточки */
        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(79, 140, 255, 0.1), transparent, rgba(0, 255, 200, 0.1), transparent);
            animation: spin 12s linear infinite;
            z-index: -1;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Иконка/логотип игры */
        .game-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f8cff, #00ffc8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            font-weight: 800;
            color: #0a0c1a;
            box-shadow: 0 0 30px rgba(79, 140, 255, 0.3);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #8b9bb8;
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* Место для скриншота (заглушка) */
        .game-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #141b33;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255,255,255,0.15);
            color: #55658a;
            font-size: 14px;
            position: relative;
        }
        /* Раскомментируйте и вставьте ссылку на картинку в src ниже, чтобы убрать заглушку */
        .game-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            display: none; /* По умолчанию скрыто */
        }

        .download-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Контейнер для кнопок */
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: #4f8cff;
            color: #0a0c1a;
        }
        .btn-primary:hover {
            background: #6a9eff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 140, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .footer-note {
            font-size: 13px;
            color: #667799;
            margin-top: 15px;
        }

        .platform-badge {
            background: rgba(79, 140, 255, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            color: #4f8cff;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Адаптация под мобилки */
        @media (max-width: 600px) {
            .game-card { padding: 30px 16px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="game-card">
        <!-- Логотип -->
        <div class="game-icon">K</div>
        
        <!-- Название и описание -->
        <h1>Konke</h1>
        <p class="subtitle">Эпичное приключение уже ждёт тебя</p>

        <!-- СКРИНШОТ ИГРЫ -->
        <div class="game-media">
            <span>Здесь будет скриншот</span>
            <!-- КОГДА ЗАГРУЗИТЕ КАРТИНКУ В ПАПКУ, РАСКОММЕНТИРУЙТЕ ЭТОТ ТЕГ И УДАЛИТЕ ТЕКСТ ВЫШЕ -->
            <!-- <img src="ВАША_КАРТИНКА.jpg" alt="Геймплей игры" style="display:block;" /> -->
        </div>

        <!-- Блок скачивания -->
        <div class="platform-badge" id="platform-indicator">Определяю вашу платформу...</div>
        <div class="download-title">Скачать игру</div>

        <div class="download-buttons">
            <!-- Кнопка для Windows -->
            <a class="btn btn-primary" href="ССЫЛКА_НА_WINDOWS.EXE">
                <svg viewBox="0 0 24 24"><path d="M3,5.5 L10,4.5 L10,11.5 L3,11.5 L3,5.5 Z M11,4.3 L21,3 L21,11.5 L11,11.5 L11,4.3 Z M3,12.5 L10,12.5 L10,19.5 L3,20.5 L3,12.5 Z M11,12.5 L21,12.5 L21,21 L11,19.7 L11,12.5 Z"/></svg>
                Скачать для Windows
            </a>
            
            <!-- Кнопка для Android -->
            <a class="btn btn-secondary" href="ССЫЛКА_НА_ANDROID.APK">
                <svg viewBox="0 0 24 24"><path d="M17.523,15.3414 C17.523,15.3414 17.523,15.3414 17.523,15.3414 C17.375,15.3414 17.298,15.2334 17.302,15.0274 L17.302,8.7314 C17.302,8.5244 17.381,8.4174 17.529,8.4174 C17.677,8.4174 17.754,8.5244 17.754,8.7314 L17.754,15.0274 C17.754,15.2334 17.674,15.3414 17.523,15.3414 Z M6.477,15.3414 C6.326,15.3414 6.246,15.2334 6.246,15.0274 L6.246,8.7314 C6.246,8.5244 6.323,8.4174 6.471,8.4174 C6.619,8.4174 6.698,8.5244 6.698,8.7314 L6.698,15.0274 C6.698,15.2334 6.625,15.3414 6.477,15.3414 Z M15.573,19.7224 L15.573,17.5324 L8.427,17.5324 L8.427,19.7224 C8.427,20.2584 7.993,20.6924 7.458,20.6924 C6.922,20.6924 6.488,20.2584 6.488,19.7224 L6.488,17.5324 L6.488,17.5324 C4.572,16.0524 3.451,13.7004 3.451,11.1214 L3.451,8.1954 L20.549,8.1954 L20.549,11.1214 C20.549,13.7004 19.428,16.0524 17.512,17.5324 L17.512,17.5324 L17.512,19.7224 C17.512,20.2584 17.078,20.6924 16.542,20.6924 C16.007,20.6924 15.573,20.2584 15.573,19.7224 Z M3.451,6.2554 C3.451,5.7194 3.885,5.2854 4.421,5.2854 L19.579,5.2854 C20.115,5.2854 20.549,5.7194 20.549,6.2554 L20.549,6.8364 L3.451,6.8364 L3.451,6.2554 Z M8.685,3.4764 L7.943,2.2254 C7.884,2.1184 7.915,1.9824 8.022,1.9234 C8.13,1.8644 8.265,1.8954 8.325,2.0024 L9.067,3.2534 C10.043,2.7944 11.195,2.5334 12.421,2.5334 C13.647,2.5334 14.799,2.7944 15.776,3.2534 L16.518,2.0024 C16.578,1.8954 16.713,1.8644 16.82,1.9234 C16.927,1.9824 16.958,2.1184 16.899,2.2254 L16.157,3.4764 C17.382,4.2984 18.215,5.5174 18.4,6.8364 L6.521,6.8364 C6.706,5.5174 7.539,4.2984 8.685,3.4764 Z"/></svg>
                Скачать для Android
            </a>
        </div>

        <div class="footer-note">Версия 1.0 • Размер: ~250 МБ</div>
    </div>

    <script>
        // Маленький скрипт, который определяет, открыт ли сайт на телефоне
        // Он подсвечивает нужную кнопку и пишет подсказку.
        document.addEventListener('DOMContentLoaded', () => {
            const indicator = document.getElementById('platform-indicator');
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isWindows = /Windows/i.test(navigator.userAgent);
            const buttons = document.querySelectorAll('.btn');

            if (isAndroid) {
                indicator.textContent = '📱 Рекомендуется для Android';
                indicator.style.color = '#00ffc8';
                indicator.style.background = 'rgba(0, 255, 200, 0.15)';
                // Сделать Android кнопку главной
                buttons[1].classList.remove('btn-secondary');
                buttons[1].classList.add('btn-primary');
                buttons[0].classList.remove('btn-primary');
                buttons[0].classList.add('btn-secondary');
            } else if (isWindows) {
                indicator.textContent = '💻 Рекомендуется для ПК';
                indicator.style.color = '#4f8cff';
                indicator.style.background = 'rgba(79, 140, 255, 0.15)';
            } else {
                indicator.textContent = '🖥️ Выбери свою платформу';
                indicator.style.color = '#8b9bb8';
                indicator.style.background = 'rgba(255, 255, 255, 0.05)';
            }
        });
    </script>
</body>
</html>
